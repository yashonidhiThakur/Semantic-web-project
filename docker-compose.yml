services:
  # ---- Apache Jena Fuseki (RDF Triple Store) ----
  fuseki:
    image: stain/jena-fuseki:latest
    platform: linux/amd64
    container_name: dm-fuseki
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin123
      - FUSEKI_DATASET_1=Products
    volumes:
      # Persist Fuseki data (databases, configuration) across restarts
      - fuseki-data:/fuseki
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:3030/$$/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  # ---- RDF Data Loader (runs once on first startup, then exits) ----
  rdf-loader:
    build:
      context: .
      dockerfile: Dockerfile.rdf-loader
    container_name: dm-rdf-loader
    depends_on:
      fuseki:
        condition: service_healthy
    volumes:
      # Share volume so marker persists across restarts
      - fuseki-data:/fuseki
    environment:
      - FUSEKI_URL=http://fuseki:3030
      - ADMIN_PASSWORD=admin123
    restart: "no"

  # ---- XCommerce Backend (Spring Boot + Static Frontend) ----
  backend:
    build:
      context: ./XCommerce
      dockerfile: ../Dockerfile.backend
    container_name: dm-backend
    ports:
      - "8080:8080"
    depends_on:
      fuseki:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

volumes:
  fuseki-data:
    driver: local
